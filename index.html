    <style>
        /* Custom scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f5f5f4; 
        }
        ::-webkit-scrollbar-thumb {
            background: #d6d3d1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a29e; 
        }

        /* Chart Container Strategy - Strict Adherence to Requirements */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 300px; /* Mobile base */
            max-height: 400px;
        }
        @media (min-width: 768px) {
            .chart-container {
                height: 400px; /* Tablet/Desktop */
            }
        }
        
        /* Smooth transitions */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <!-- Chosen Palette: Warm Neutrals (Stone/Orange). Stone for background to induce calm, Orange for energy/action, Teal for analytical data. -->
    <!-- Application Structure Plan: Dashboard layout with a sidebar navigation (collapsible on mobile). 
         This structure was chosen to mimic a "Creator Studio" or LMS (Learning Management System). 
         It allows the user to jump between the 6 distinct "Lectures" non-linearly while maintaining a persistent view of their overall goal.
         Each section follows a pattern: Context Intro -> Interactive Visualization -> Actionable Steps -> Homework. -->
    <!-- Visualization & Content Choices: 
         1. Overview: Progress Bar (Simple HTML/CSS) -> Goal: Track course completion.
         2. Archive (L1): Funnel Chart (Chart.js Bar) -> Goal: Show how to filter 1200 clips down to "Gold". Interaction: Filtering simulation.
         3. Story (L2): Line Chart (Chart.js) -> Goal: Visualize the "Retention Curve" of a Short. Interaction: Click points to see script elements.
         4. Competitors (L5): Radar Chart (Chart.js) -> Goal: Compare "Me" vs "Pros" on specific metrics. Interaction: Toggle datasets.
         5. Routine (L6): Doughnut Chart (Chart.js) -> Goal: Visualize the daily time allocation.
         CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. All icons are Unicode. -->
</head>

                    <div class="mt-12 flex justify-between">
                         <button onclick="router('dashboard')" class="text-stone-500 hover:text-stone-800 font-medium transition">
                            ← В меню
                        </button>
                        ${data.id < 6 ? `
                        <button onclick="router('lecture${data.id + 1}')" class="bg-stone-800 hover:bg-stone-900 text-white px-6 py-3 rounded-xl font-bold transition flex items-center gap-2">
                            Следующий модуль →
                        </button>
                        ` : `
                         <button onclick="router('dashboard')" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-xl font-bold transition flex items-center gap-2">
                            Завершить курс 🎉
                        </button>
                        `}
                    </div>
                </div>
            `;

            mainContent.innerHTML = html;
            initChart(data.vizType, key);
        }

        function initChart(type, key) {
            const ctx = document.getElementById('lectureChart');
            if (!ctx) return;
            
            if (currentChart) {
                currentChart.destroy();
            }

            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { font: { family: 'ui-sans-serif, system-ui, sans-serif' } }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(28, 25, 23, 0.9)',
                        padding: 12,
                        cornerRadius: 8,
                        titleFont: { size: 14, weight: 'bold' },
                        bodyFont: { size: 13 }
                    }
                }
            };

            // Chart Configuration logic based on type
            if (type === 'funnel') {
                // Simulating a Funnel using a Bar chart for Lecture 1
                currentChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Всего видео', 'Технически ок', 'С эмоциями', 'Золото (Избранное)'],
                        datasets: [{
                            label: 'Количество файлов',
                            data: [1200, 800, 300, 60],
                            backgroundColor: [
                                '#e7e5e4', // stone-200
                                '#d6d3d1', // stone-300
                                '#f97316', // orange-500
                                '#f59e0b'  // amber-500 (Gold)
                            ],
                            borderRadius: 8
                        }]
                    },
                    options: {
                        ...commonOptions,
                        indexAxis: 'y',
                        scales: {
                            x: { grid: { display: false } },
                            y: { grid: { display: false } }
                        }
                    }
                });
            } else if (type === 'line') {
                // Retention Curve for Lecture 2
                currentChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['0s', '3s (Hook)', '10s', '20s (Развитие)', '40s', '55s (Панч)', '60s'],
                        datasets: [{
                            label: 'Внимание зрителя (Идеал)',
                            data: [100, 95, 85, 80, 75, 90, 60],
                            borderColor: '#f97316',
                            backgroundColor: 'rgba(249, 115, 22, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 6,
                            pointHoverRadius: 8
                        },
                        {
                            label: 'Скучное видео',
                            data: [100, 40, 20, 10, 5, 2, 0],
                            borderColor: '#a8a29e',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            tension: 0.4,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        ...commonOptions,
                        scales: {
                            y: { 
                                title: { display: true, text: '% Удержания' },
                                grid: { color: '#f5f5f4' }
                            },
                            x: { grid: { display: false } }
                        }
                    }
                });
            } else if (type === 'bar-stacked') {
                // Shot Composition for Lecture 3
                currentChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Ролик 1', 'Ролик 2', 'Ролик 3'],
                        datasets: [
                            { label: 'Общий план', data: [15, 10, 12], backgroundColor: '#78716c' },
                            { label: 'Средний план', data: [30, 25, 28], backgroundColor: '#a8a29e' },
                            { label: 'Крупный план (Детали)', data: [55, 65, 60], backgroundColor: '#f97316' }
                        ]
                    },
                    options: {
                        ...commonOptions,
                        scales: {
                            x: { stacked: true, grid: { display: false } },
                            y: { stacked: true, display: false }
                        },
                        plugins: {
                            ...commonOptions.plugins,
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return context.dataset.label + ': ' + context.raw + '%';
                                    }
                                }
                            }
                        }
                    }
                });
            } else if (type === 'radar') {
                // Competitor Analysis for Lecture 5
                currentChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['Сюжет', 'Динамика', 'Качество аудио', 'Юмор', 'Регулярность'],
                        datasets: [{
                            label: 'Ты сейчас',
                            data: [30, 40, 50, 60, 20],
                            fill: true,
                            backgroundColor: 'rgba(168, 162, 158, 0.2)',
                            borderColor: '#a8a29e',
                            pointBackgroundColor: '#a8a29e'
                        }, {
                            label: 'Цель (ТОП каналы)',
                            data: [90, 85, 95, 80, 100],
                            fill: true,
                            backgroundColor: 'rgba(249, 115, 22, 0.2)',
                            borderColor: '#f97316',
                            pointBackgroundColor: '#f97316'
                        }]
                    },
                    options: {
                        ...commonOptions,
                        scales: {
                            r: {
                                angleLines: { color: '#e7e5e4' },
                                grid: { color: '#e7e5e4' },
                                pointLabels: { font: { size: 12, weight: 'bold' } },
                                suggestMin: 0,
                                suggestMax: 100
                            }
                        }
                    }
                });
            } else if (type === 'doughnut') {
                // Routine for Lecture 6
                currentChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Сценарий (Утро)', 'Съемка (Вечер)', 'Монтаж (Ночь)', 'Отдых/Сон', 'Работа/Быт'],
                        datasets: [{
                            data: [1, 1, 1, 8, 13],
                            backgroundColor: [
                                '#f97316', // Orange
                                '#fdba74', // Orange Light
                                '#c2410c', // Dark Orange
                                '#e7e5e4', // Stone
                                '#f5f5f4'  // Light Stone
                            ],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        ...commonOptions,
                        cutout: '70%',
                        plugins: {
                            ...commonOptions.plugins,
                            legend: { position: 'right' }
                        }
                    }
                });
            } else if (type === 'tech-tree') {
                // Lecture 4 Custom Interaction (simulated with bar for simplicity in this constraints)
                // Represents "Layer density" in timeline
                currentChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Любитель', 'Начинающий', 'PRO Продюсер'],
                        datasets: [
                            { label: 'Видео дорожка', data: [1, 1, 1], backgroundColor: '#d6d3d1' },
                            { label: 'Аудио (Голос)', data: [1, 1, 1], backgroundColor: '#a8a29e' },
                            { label: 'Музыка', data: [0, 1, 1], backgroundColor: '#78716c' },
                            { label: 'SFX (Звуки)', data: [0, 0, 1], backgroundColor: '#f97316' },
                            { label: 'Субтитры', data: [0, 0, 1], backgroundColor: '#ea580c' },
                            { label: 'Оверлеи/Мемы', data: [0, 0, 1], backgroundColor: '#9a3412' }
                        ]
                    },
                    options: {
                        ...commonOptions,
                        scales: {
                            x: { stacked: true },
                            y: { 
                                stacked: true, 
                                display: false, 
                                title: {display: true, text: 'Сложность таймлайна'} 
                            }
                        }
                    }
                });
            }
        }

        // --- EVENTS ---

        document.getElementById('menu-btn').addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
            sidebar.classList.add('translate-x-0');
            overlay.classList.remove('hidden');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
            sidebar.classList.remove('translate-x-0');
            overlay.classList.add('hidden');
        });

        // Initialize
        renderDashboard();

    </script>
</body>
</html>
